<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Evolsphere — La sphère qui évolue</title>
<style>
  :root{
    --bg-deep: #07040D;
    --bg-mid: #140A22;
    --teal: #29F0D0;
    --violet: #A56BFF;
    --amber: #FF9B4A;
    --hot: #FF3E9A;
    --ink: #F7F4FF;
    --ink-dim: #B8AECC;
    --display-font: 'Syne', sans-serif;
    --body-font: 'Inter', sans-serif;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{
    width:100%; height:100%;
    background: radial-gradient(130% 110% at 50% 0%, var(--bg-mid) 0%, var(--bg-deep) 65%);
    overflow:hidden;
    font-family: var(--body-font);
    color: var(--ink);
  }
  #canvas-holder{ position:fixed; inset:0; z-index:1; }
  canvas{ display:block; }

  .flash{
    position:fixed; inset:0; z-index:3; pointer-events:none;
    background: radial-gradient(45% 40% at 50% 45%, rgba(255,255,255,0.9) 0%, rgba(41,240,208,0.25) 35%, transparent 70%);
    opacity:0;
    animation: flashPulse 1.3s 0.05s ease-out forwards;
  }
  @keyframes flashPulse{
    0%{ opacity:1; transform: scale(0.6); }
    100%{ opacity:0; transform: scale(1.6); }
  }

  .veil{
    position:fixed; inset:0; z-index:2; pointer-events:none;
    background: radial-gradient(55% 46% at 50% 45%, transparent 0%, rgba(7,4,13,0.6) 100%);
  }

  header{
    position:fixed; top:0; left:0; right:0; z-index:5;
    display:flex; align-items:center; justify-content:space-between;
    padding: 30px 40px;
    opacity:0;
    animation: dropIn 0.7s 0.15s cubic-bezier(.16,1.4,.4,1) forwards;
  }
  .logo{
    font-family: var(--display-font);
    font-weight:800;
    font-size:20px;
    letter-spacing:0.01em;
  }
  .logo span{
    background: linear-gradient(120deg, var(--teal), var(--hot));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }

  .badge{
    font-size:11px; letter-spacing:0.16em; text-transform:uppercase;
    color: var(--ink-dim);
    border:1px solid rgba(255,255,255,0.16);
    border-radius:999px; padding:8px 14px;
    display:flex; align-items:center; gap:8px;
  }
  .badge::before{
    content:''; width:6px; height:6px; border-radius:50%;
    background: var(--teal);
    box-shadow: 0 0 8px var(--teal);
    animation: dot 1.4s ease-in-out infinite;
  }
  @keyframes dot{ 0%,100%{ opacity:1; } 50%{ opacity:0.25; } }

  main{
    position:fixed; inset:0; z-index:4;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding: 0 24px; pointer-events:none;
  }

  .eyebrow{
    font-size:12px; letter-spacing:0.35em; text-transform:uppercase;
    color: var(--teal);
    margin-bottom:20px;
    opacity:0;
    animation: dropIn 0.6s 0.35s cubic-bezier(.16,1.4,.4,1) forwards;
  }

  h1{
    font-family: var(--display-font);
    font-weight:800;
    font-size: clamp(46px, 9.5vw, 112px);
    line-height:0.94;
    letter-spacing:-0.015em;
    max-width: 15ch;
  }
  h1 .line{
    display:block;
    overflow:hidden;
  }
  h1 .line span{
    display:inline-block;
    background: linear-gradient(120deg, var(--ink) 20%, var(--teal) 45%, var(--hot) 75%, var(--amber) 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    transform: translateY(115%) rotate(3deg);
    animation: lineUp 0.85s cubic-bezier(.16,1,.3,1) forwards;
  }
  h1 .line:nth-child(1) span{ animation-delay: 0.45s; }
  h1 .line:nth-child(2) span{ animation-delay: 0.58s; }

  @keyframes lineUp{
    to{ transform: translateY(0) rotate(0deg); }
  }

  p.sub{
    margin-top: 24px;
    max-width: 44ch;
    font-size: clamp(15px, 1.6vw, 18px);
    line-height:1.6;
    color: var(--ink-dim);
    opacity:0;
    animation: dropIn 0.7s 0.95s cubic-bezier(.16,1.4,.4,1) forwards;
  }

  .cta-row{
    margin-top: 38px;
    display:flex; gap:14px; flex-wrap:wrap; justify-content:center;
    pointer-events:auto;
    opacity:0;
    animation: dropIn 0.7s 1.15s cubic-bezier(.16,1.4,.4,1) forwards;
  }

  .btn{
    font-family: var(--body-font); font-weight:700; font-size:14px;
    padding: 15px 28px; border-radius:999px; cursor:pointer; border:none;
    transition: transform 0.25s cubic-bezier(.16,1,.3,1), box-shadow 0.25s ease, filter 0.25s ease;
    position:relative;
  }
  .btn-primary{
    background: linear-gradient(120deg, var(--teal), var(--hot));
    color: #07040D;
    box-shadow: 0 8px 26px rgba(165,107,255,0.28);
  }
  .btn-primary:hover{ transform: translateY(-3px) scale(1.03); box-shadow: 0 14px 34px rgba(255,62,154,0.4); }
  .btn-ghost{
    background: rgba(255,255,255,0.04);
    color: var(--ink);
    border: 1px solid rgba(255,255,255,0.22);
    backdrop-filter: blur(6px);
  }
  .btn-ghost:hover{ transform: translateY(-3px) scale(1.03); border-color: rgba(255,255,255,0.55); }

  footer{
    position:fixed; bottom:0; left:0; right:0; z-index:5;
    display:flex; align-items:center; justify-content:space-between;
    padding: 28px 40px;
    opacity:0;
    animation: dropIn 0.7s 1.3s cubic-bezier(.16,1.4,.4,1) forwards;
  }
  .tagline{ font-size:12px; color: var(--ink-dim); letter-spacing:0.04em; }
  .tagline b{ color: var(--ink); font-weight:700; }

  .sound-toggle{
    pointer-events:auto;
    display:flex; align-items:center; gap:10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.16);
    border-radius:999px; padding: 11px 20px 11px 15px; cursor:pointer;
    color: var(--ink); font-size:13px; font-weight:600;
    backdrop-filter: blur(6px);
    transition: border-color 0.25s ease, background 0.25s ease, transform 0.2s ease;
  }
  .sound-toggle:hover{ border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.09); transform: scale(1.04); }

  .bars{ display:flex; align-items:flex-end; gap:2.5px; height:15px; width:18px; }
  .bars i{ display:block; width:3px; border-radius:2px; background: var(--teal); height:4px; transform-origin: bottom; }
  .sound-on .bars i{ animation: bounce 0.7s ease-in-out infinite; background: linear-gradient(180deg, var(--teal), var(--hot)); }
  .bars i:nth-child(1){ animation-delay: 0s; }
  .bars i:nth-child(2){ animation-delay: 0.12s; }
  .bars i:nth-child(3){ animation-delay: 0.24s; }
  @keyframes bounce{ 0%,100%{ height:4px; } 50%{ height:15px; } }

  @keyframes dropIn{
    from{ opacity:0; transform: translateY(-14px); }
    to{ opacity:1; transform: translateY(0); }
  }

  @media (max-width: 640px){
    header, footer{ padding: 22px 20px; }
    .tagline{ display:none; }
  }

  @media (prefers-reduced-motion: reduce){
    .bars i{ animation: none !important; }
    h1 .line span{ animation: none !important; transform:none !important; opacity:1 !important; }
    header, .eyebrow, p.sub, .cta-row, footer{ animation: none !important; opacity:1 !important; transform:none !important; }
    .flash{ display:none; }
  }
</style>
</head>
<body>

<div id="canvas-holder"></div>
<div class="flash"></div>
<div class="veil"></div>

<header>
  <div class="logo">Evol<span>sphere</span></div>
  <div class="badge">En mouvement</div>
</header>

<main>
  <div class="eyebrow">Conseil en gestion de projet</div>
  <h1>
    <span class="line"><span>Chaque projet</span></span>
    <span class="line"><span>fait évoluer la forme.</span></span>
  </h1>
  <p class="sub">
    Une sphère qui pulse au rythme de la musique — comme une méthode
    qui s'adapte à chaque mission. PMP, Agile, hybride : la forme suit le contexte.
  </p>
  <div class="cta-row">
    <button class="btn btn-primary" onclick="sendPrompt('Je veux en savoir plus sur les missions Evolsphere')">Discuter d'un projet</button>
    <button class="btn btn-ghost" onclick="sendPrompt('Montre-moi le Sprint stratégique Evolsphere')">Voir le Sprint stratégique</button>
  </div>
</main>

<footer>
  <div class="tagline">Evolsphere — <b>structurer</b>, <b>exécuter</b>, <b>évoluer</b>.</div>
  <div class="sound-toggle" id="soundToggle">
    <div class="bars"><i></i><i></i><i></i></div>
    <span id="soundLabel">Activer le son</span>
  </div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
<script>
(function(){
  // ---------- 3D SCENE ----------
  const holder = document.getElementById('canvas-holder');
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, 9.5);

  const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  holder.appendChild(renderer.domElement);

  const key = new THREE.PointLight(0x29f0d0, 4.2, 24);
  key.position.set(4, 3, 5);
  scene.add(key);
  const rim = new THREE.PointLight(0xa56bff, 4.0, 24);
  rim.position.set(-4.5, -2, -3);
  scene.add(rim);
  const hotLight = new THREE.PointLight(0xff3e9a, 2.2, 22);
  hotLight.position.set(0, -3.5, 4);
  scene.add(hotLight);
  scene.add(new THREE.AmbientLight(0x1a1226, 1.0));

  const geo = new THREE.IcosahedronGeometry(2.1, 5);
  const colors = [];
  const c1 = new THREE.Color(0x29f0d0);
  const c2 = new THREE.Color(0xa56bff);
  const c3 = new THREE.Color(0xff3e9a);
  const c4 = new THREE.Color(0xff9b4a);
  const pos = geo.attributes.position;
  for(let i=0; i<pos.count; i++){
    const y = (pos.getY(i) / 2.1 + 1) / 2;
    let col;
    if(y < 0.33) col = c1.clone().lerp(c2, y/0.33);
    else if(y < 0.66) col = c2.clone().lerp(c3, (y-0.33)/0.33);
    else col = c3.clone().lerp(c4, (y-0.66)/0.34);
    colors.push(col.r, col.g, col.b);
  }
  geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

  const mat = new THREE.MeshStandardMaterial({
    vertexColors: true, roughness: 0.3, metalness: 0.2,
    emissive: 0x180d26, emissiveIntensity: 0.55
  });
  const sphere = new THREE.Mesh(geo, mat);
  scene.add(sphere);

  const wireGeo = new THREE.IcosahedronGeometry(2.16, 2);
  const wireMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe:true, transparent:true, opacity:0.08 });
  const wireSphere = new THREE.Mesh(wireGeo, wireMat);
  scene.add(wireSphere);

  // orbiting particle ring for extra energy
  const particleCount = 260;
  const pGeo = new THREE.BufferGeometry();
  const pPos = new Float32Array(particleCount*3);
  const pColor = new Float32Array(particleCount*3);
  const orbitRadius = [];
  const orbitAngle = [];
  const orbitTilt = [];
  const palette = [c1, c2, c3, c4];
  for(let i=0;i<particleCount;i++){
    const r = 3.0 + Math.random()*2.2;
    const a = Math.random()*Math.PI*2;
    const tlt = (Math.random()-0.5)*1.4;
    orbitRadius.push(r); orbitAngle.push(a); orbitTilt.push(tlt);
    const col = palette[Math.floor(Math.random()*palette.length)];
    pColor[i*3]=col.r; pColor[i*3+1]=col.g; pColor[i*3+2]=col.b;
  }
  pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
  pGeo.setAttribute('color', new THREE.BufferAttribute(pColor, 3));
  const pMat = new THREE.PointsMaterial({ size:0.05, vertexColors:true, transparent:true, opacity:0.85, sizeAttenuation:true });
  const particles = new THREE.Points(pGeo, pMat);
  scene.add(particles);

  const basePositions = Float32Array.from(pos.array);

  function fade(t){ return t*t*t*(t*(t*6-15)+10); }
  function lerp(t,a,b){ return a+t*(b-a); }
  function grad(hash,x,y,z){
    const h = hash & 15;
    const u = h<8 ? x : y;
    const v = h<4 ? y : (h===12||h===14 ? x : z);
    return ((h&1)===0 ? u : -u) + ((h&2)===0 ? v : -v);
  }
  const permBase = [];
  for(let i=0;i<256;i++) permBase[i]=i;
  for(let i=255;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [permBase[i],permBase[j]]=[permBase[j],permBase[i]]; }
  const perm = new Array(512);
  for(let i=0;i<512;i++) perm[i]=permBase[i&255];

  function noise3(x,y,z){
    const X=Math.floor(x)&255, Y=Math.floor(y)&255, Z=Math.floor(z)&255;
    x-=Math.floor(x); y-=Math.floor(y); z-=Math.floor(z);
    const u=fade(x), v=fade(y), w=fade(z);
    const A=perm[X]+Y, AA=perm[A]+Z, AB=perm[A+1]+Z;
    const B=perm[X+1]+Y, BA=perm[B]+Z, BB=perm[B+1]+Z;
    return lerp(w,
      lerp(v, lerp(u, grad(perm[AA],x,y,z), grad(perm[BA],x-1,y,z)),
              lerp(u, grad(perm[AB],x,y-1,z), grad(perm[BB],x-1,y-1,z))),
      lerp(v, lerp(u, grad(perm[AA+1],x,y,z-1), grad(perm[BA+1],x-1,y,z-1)),
              lerp(u, grad(perm[AB+1],x,y-1,z-1), grad(perm[BB+1],x-1,y-1,z-1)))
    );
  }

  let audioLevel = 0;
  let beatPulse = 0; // short decaying pulse triggered on each pluck hit
  const clock = { start: performance.now() };

  function animate(t){
    requestAnimationFrame(animate);
    const elapsed = (t - clock.start) * 0.001;
    const time = t * 0.00032;
    const amp = 0.22 + audioLevel * 0.85 + beatPulse * 0.35;

    const p = geo.attributes.position;
    for(let i=0;i<p.count;i++){
      const ix = i*3;
      const bx = basePositions[ix], by = basePositions[ix+1], bz = basePositions[ix+2];
      const len = Math.sqrt(bx*bx+by*by+bz*bz);
      const nx = bx/len, ny = by/len, nz = bz/len;
      const n = noise3(nx*1.7 + time*4.2, ny*1.7 + time*4.2, nz*1.7 + time*4.2);
      const displaced = len + n * amp;
      p.setXYZ(i, nx*displaced, ny*displaced, nz*displaced);
    }
    p.needsUpdate = true;
    geo.computeVertexNormals();

    const scalePulse = 1 + beatPulse * 0.09 + Math.sin(time*2.2)*0.02;
    sphere.scale.setScalar(scalePulse);

    sphere.rotation.y += 0.0032 + audioLevel*0.01;
    sphere.rotation.x = Math.sin(time*0.8)*0.2;
    wireSphere.rotation.y -= 0.0022;
    wireSphere.rotation.x = sphere.rotation.x;
    wireSphere.scale.setScalar(1 + beatPulse*0.06);

    // particles orbit + drift
    const pp = pGeo.attributes.position;
    for(let i=0;i<particleCount;i++){
      orbitAngle[i] += 0.0025 + audioLevel*0.01 + beatPulse*0.006;
      const r = orbitRadius[i] + Math.sin(elapsed*0.6+i)*0.15 + beatPulse*0.3;
      const a = orbitAngle[i];
      const tlt = orbitTilt[i];
      pp.array[i*3]   = Math.cos(a) * r;
      pp.array[i*3+1] = Math.sin(a) * r * 0.4 + tlt*1.5;
      pp.array[i*3+2] = Math.sin(a) * r * 0.6;
    }
    pp.needsUpdate = true;
    particles.rotation.y += 0.0016;

    // camera micro dolly + shake tied to beat
    camera.position.z = 9.5 - beatPulse*0.4 - audioLevel*0.5;
    camera.position.x = Math.sin(elapsed*0.35) * 0.18;
    camera.position.y = Math.cos(elapsed*0.28) * 0.12;
    camera.lookAt(0,0,0);

    key.intensity = 3.2 + audioLevel*3.5 + beatPulse*2.5;
    rim.intensity = 3.0 + audioLevel*2.8;
    hotLight.intensity = 1.6 + beatPulse*3.5;

    beatPulse *= 0.90; // decay

    renderer.render(scene, camera);
  }
  requestAnimationFrame(animate);

  window.addEventListener('resize', ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ---------- AMBIENT GENERATIVE MUSIC (Tone.js) — punchier, faster ----------
  let started = false;
  let analyser, pad, pluck, bass, reverb, filter, delay;

  window.__triggerBeatPulse = function(){ beatPulse = 1; };

  async function startAudio(){
    if(started) return;
    started = true;
    await Tone.start();

    reverb = new Tone.Reverb({ decay: 5, wet: 0.4 }).toDestination();
    delay = new Tone.FeedbackDelay('8n', 0.28).connect(reverb);
    filter = new Tone.Filter(2000, 'lowpass').connect(delay);
    analyser = new Tone.Analyser('waveform', 256);
    filter.connect(analyser);

    pad = new Tone.PolySynth(Tone.Synth, {
      oscillator: { type: 'sawtooth' },
      envelope: { attack: 0.8, decay: 0.6, sustain: 0.5, release: 2.2 }
    }).connect(filter);
    pad.volume.value = -16;

    pluck = new Tone.Synth({
      oscillator: { type: 'triangle' },
      envelope: { attack: 0.005, decay: 0.25, sustain: 0, release: 0.5 }
    }).connect(filter);
    pluck.volume.value = -10;

    bass = new Tone.MembraneSynth({
      pitchDecay: 0.02, octaves: 4,
      envelope: { attack: 0.001, decay: 0.35, sustain: 0 }
    }).connect(reverb);
    bass.volume.value = -6;

    const padChords = [
      ['C3','G3','D4'], ['A2','E3','C4'],
      ['F2','C3','G3'], ['G2','D3','A3']
    ];
    let chordIdx = 0;
    new Tone.Loop((time)=>{
      pad.triggerAttackRelease(padChords[chordIdx % padChords.length], '2n', time);
      chordIdx++;
    }, '1m').start(0);

    const pluckNotes = ['C5','D5','E5','G5','A5','C6'];
    new Tone.Sequence((time, note)=>{
      if(note !== null){
        pluck.triggerAttackRelease(note, '16n', time);
        Tone.Draw.schedule(()=>{ window.__triggerBeatPulse(); }, time);
      }
    }, [
      pluckNotes[0], null, pluckNotes[2], pluckNotes[1],
      null, pluckNotes[3], null, pluckNotes[4],
      pluckNotes[2], null, pluckNotes[5], null,
      pluckNotes[1], null, pluckNotes[3], null
    ], '16n').start(0);

    new Tone.Loop((time)=>{
      bass.triggerAttackRelease('C1', '8n', time);
      Tone.Draw.schedule(()=>{ window.__triggerBeatPulse(); }, time);
    }, '2n').start('0');

    Tone.Transport.bpm.value = 104;
    Tone.Transport.start();

    function pollLevel(){
      if(!started) return;
      const wave = analyser.getValue();
      let sum = 0;
      for(let i=0;i<wave.length;i++) sum += Math.abs(wave[i]);
      const level = Math.min(1, (sum/wave.length) * 7);
      audioLevel += (level - audioLevel) * 0.25;
      requestAnimationFrame(pollLevel);
    }
    pollLevel();
  }

  function stopAudio(){
    started = false;
    Tone.Transport.stop();
    Tone.Transport.cancel();
    if(pad) pad.releaseAll();
    audioLevel = 0;
  }

  const toggle = document.getElementById('soundToggle');
  const label = document.getElementById('soundLabel');
  let isOn = false;
  toggle.addEventListener('click', async ()=>{
    isOn = !isOn;
    if(isOn){
      await startAudio();
      toggle.classList.add('sound-on');
      label.textContent = 'Couper le son';
    } else {
      stopAudio();
      toggle.classList.remove('sound-on');
      label.textContent = 'Activer le son';
    }
  });

  if (typeof window.sendPrompt !== 'function') {
    window.sendPrompt = function(text){ console.log('sendPrompt:', text); };
  }
})();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</body>
</html>
